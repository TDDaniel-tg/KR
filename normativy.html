<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="norm_style.css">
</head>
<body>
    <div class="button-container">
        <button class="popup-btn" id="popupBtn1">Мужские Нормативы</button>
        <button class="popup-btn" id="popupBtn2">Женские Нормативы</button>
    </div>

    <!-- Поп-ап 1 -->
    <div class="popup" id="popup1">
        <div class="popup-content">
            <span class="close" id="close1">&times;</span>
            
            <h2>Я же сказал смотри женские)</h2>
            
        </div>
    </div>

    <!-- Поп-ап 2 -->
    <div class="popup" id="popup2">
        <div class="popup-content">
            <span class="close" id="close2">&times;</span>
            <h2>Женские Нормативы</h2>
            <h3>Военный жим</h3>
            <img src="женщины военный жим.jpg" alt="женщины военный жим.jpg">
            <h3>Становая тяга без экип</h3>
            <img src="становая тяга без экип.jpg" alt="становая тяга без экип.jpg">
            <h3>Cиловое двоеборье</h3>
            <img src="силовое двоеборье.jpg">
            <h3>Cтрогий подъем  любители</h3>
            <img src="строгий подъем  любители.jpg">
            <h3>Жим лежа софт.экип.</h3>
            <img src="жим лежа софт.экип.jpg">
            <h3>Армлифтинг</h3>
            <img src="армлифтинг.jpg">
            
        </div>
    </div>

    <script>
        // Получаем элементы
        const popup1 = document.getElementById('popup1');
        const popup2 = document.getElementById('popup2');
        const popupBtn1 = document.getElementById('popupBtn1');
        const popupBtn2 = document.getElementById('popupBtn2');
        const close1 = document.getElementById('close1');
        const close2 = document.getElementById('close2');

        // Функции открытия
        popupBtn1.addEventListener('click', () => {
            popup1.style.display = 'flex';
        });

        popupBtn2.addEventListener('click', () => {
            popup2.style.display = 'flex';
        });

        // Функции закрытия
        close1.addEventListener('click', () => {
            popup1.style.display = 'none';
        });

        close2.addEventListener('click', () => {
            popup2.style.display = 'none';
        });

        // Закрытие поп-апа при клике вне области
        window.addEventListener('click', (e) => {
            if (e.target === popup1) {
                popup1.style.display = 'none';
            }
            if (e.target === popup2) {
                popup2.style.display = 'none';
            }
        });
    </script>

</body>
</html>
